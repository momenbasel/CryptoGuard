<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#12122a"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="50%" stop-color="#162040"/>
      <stop offset="100%" stop-color="#0e1530"/>
    </linearGradient>
    <!-- Cyan glow -->
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    <!-- Outer glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
    </filter>
    <!-- Chain link pattern -->
    <clipPath id="shieldClip">
      <path d="M256 68 L400 140 L400 300 Q400 400 256 452 Q112 400 112 300 L112 140 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="64"/>

  <!-- Ambient glow behind shield -->
  <ellipse cx="256" cy="260" rx="140" ry="160" fill="#00d4ff" opacity="0.06" filter="url(#bigGlow)"/>

  <!-- Shield body -->
  <path d="M256 78 L390 145 L390 295 Q390 388 256 438 Q122 388 122 295 L122 145 Z"
        fill="url(#shieldFill)" stroke="url(#cyanGlow)" stroke-width="2.5" opacity="0.95"/>

  <!-- Shield inner border glow -->
  <path d="M256 78 L390 145 L390 295 Q390 388 256 438 Q122 388 122 295 L122 145 Z"
        fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.3" filter="url(#glow)"/>

  <!-- Blockchain chain links inside shield -->
  <g clip-path="url(#shieldClip)" opacity="0.12" stroke="#00d4ff" stroke-width="1" fill="none">
    <!-- Horizontal chain rows -->
    <line x1="100" y1="160" x2="412" y2="160"/>
    <line x1="100" y1="210" x2="412" y2="210"/>
    <line x1="100" y1="260" x2="412" y2="260"/>
    <line x1="100" y1="310" x2="412" y2="310"/>
    <line x1="100" y1="360" x2="412" y2="360"/>
    <!-- Vertical chain columns -->
    <line x1="180" y1="80" x2="180" y2="460"/>
    <line x1="256" y1="80" x2="256" y2="460"/>
    <line x1="332" y1="80" x2="332" y2="460"/>
    <!-- Chain link nodes -->
    <circle cx="180" cy="160" r="5" fill="#00d4ff" opacity="0.5"/>
    <circle cx="332" cy="160" r="5" fill="#00d4ff" opacity="0.5"/>
    <circle cx="256" cy="210" r="5" fill="#00d4ff" opacity="0.5"/>
    <circle cx="180" cy="260" r="5" fill="#00d4ff" opacity="0.4"/>
    <circle cx="332" cy="260" r="5" fill="#00d4ff" opacity="0.4"/>
    <circle cx="256" cy="310" r="5" fill="#00d4ff" opacity="0.3"/>
    <circle cx="180" cy="360" r="5" fill="#00d4ff" opacity="0.3"/>
    <circle cx="332" cy="360" r="5" fill="#00d4ff" opacity="0.3"/>
  </g>

  <!-- Central AI neural network node -->
  <g filter="url(#softGlow)">
    <!-- Central hub -->
    <circle cx="256" cy="245" r="28" fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.9"/>
    <circle cx="256" cy="245" r="18" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    <circle cx="256" cy="245" r="8" fill="#00d4ff" opacity="0.9"/>

    <!-- Neural connections radiating out -->
    <!-- Top -->
    <line x1="256" y1="217" x2="256" y2="175" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    <circle cx="256" cy="170" r="5" fill="#00d4ff" opacity="0.6"/>
    <!-- Top-right -->
    <line x1="278" y1="228" x2="315" y2="195" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    <circle cx="318" cy="192" r="5" fill="#00d4ff" opacity="0.5"/>
    <!-- Top-left -->
    <line x1="234" y1="228" x2="197" y2="195" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    <circle cx="194" cy="192" r="5" fill="#00d4ff" opacity="0.5"/>
    <!-- Right -->
    <line x1="284" y1="245" x2="330" y2="245" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <circle cx="334" cy="245" r="4" fill="#00d4ff" opacity="0.5"/>
    <!-- Left -->
    <line x1="228" y1="245" x2="182" y2="245" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <circle cx="178" cy="245" r="4" fill="#00d4ff" opacity="0.5"/>
    <!-- Bottom-right -->
    <line x1="278" y1="262" x2="310" y2="295" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <circle cx="313" cy="298" r="4" fill="#00d4ff" opacity="0.4"/>
    <!-- Bottom-left -->
    <line x1="234" y1="262" x2="202" y2="295" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <circle cx="199" cy="298" r="4" fill="#00d4ff" opacity="0.4"/>
    <!-- Bottom -->
    <line x1="256" y1="273" x2="256" y2="320" stroke="#00d4ff" stroke-width="1.5" opacity="0.35"/>
    <circle cx="256" cy="324" r="4" fill="#00d4ff" opacity="0.4"/>
  </g>

  <!-- Shield top accent line -->
  <path d="M200 110 L256 85 L312 110" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6" filter="url(#glow)"/>

  <!-- Small lock/checkmark at bottom of shield -->
  <g transform="translate(256, 390)" opacity="0.7">
    <polyline points="-10,0 -3,8 10,-8" fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </g>
</svg>
